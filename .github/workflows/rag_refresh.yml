name: RAG Data Refresh

on:
  # Disabled automated schedule to preserve manual data
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Needed to commit changes back
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
      
      - name: Generate JSON data
        run: |
          # Use seed data to generate fresh JSON (skips web scraping in CI)
          python3 scripts/scrape_to_json.py --seed
      
      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add JSON data changes
          git add data/programs.json || true
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Automated data refresh - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
        continue-on-error: true
      
      - name: Notify API refresh
        run: |
          # Trigger backend to reload data if deployed
          # Uncomment and configure based on your deployment
          # curl -X POST "${{ secrets.API_REFRESH_URL }}" \
          #   -H "X-Refresh-Secret: ${{ secrets.REFRESH_SECRET }}" \
          #   -H "Content-Type: application/json" \
          #   -d '{"async": false}' || true
          
          echo "Refresh notification sent (if configured)"
        continue-on-error: true
      
      - name: Log failure
        if: failure()
        run: |
          echo "⚠️ RAG Refresh Failed - Check logs for details"
          echo "Run ID: ${{ github.run_id }}"
